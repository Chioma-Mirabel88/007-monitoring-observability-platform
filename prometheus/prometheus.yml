global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts/infrastructure-alerts.yml
  - /etc/prometheus/alerts/docker-alerts.yml
  - /etc/prometheus/alerts/kubernetes-alerts.yml

scrape_configs:
  - job_name: "prometheus"

    static_configs:
      - targets:
          - "prometheus:9090"

  - job_name: "node-exporter"

    static_configs:
      - targets:
          - "node-exporter:9100"